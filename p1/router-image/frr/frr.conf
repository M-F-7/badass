! Generic FRR base config for BADASS.
! The image must be reusable, so there is no default interface addressing here.
!
frr version 8.4
frr defaults traditional
hostname router
service integrated-vtysh-config
!
ip forwarding
!
router ospf
 passive-interface default
!
router bgp 65000
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 no bgp network import-check
!
router isis BADASS
 net 49.0001.0000.0000.0001.00
 is-type level-2-only
!
line vty
!
